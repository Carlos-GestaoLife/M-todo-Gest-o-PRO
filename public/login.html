<meta charset="UTF-8">

<meta name="theme-color" content="#060a1f">
<meta name="color-scheme" content="dark">
<title>Entrar · Gestão Life PRO</title>
<style>
  :root {
    --bg:#0b1230; --bg-2:#121a42; --card:#1a2357;
    --accent:#4dc9ff; --accent-2:#7aa2ff;
    --text:#eef2ff; --text-dim:#a8b2d8;
    --danger:#f87171;
    --border:rgba(255,255,255,0.08);
    --body-bg-1: #060a1f; --body-bg-2: #0b1230;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--body-bg-1); }
  body {
    margin:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background: linear-gradient(180deg,var(--body-bg-1) 0%,var(--body-bg-2) 100%);
    color: var(--text); line-height: 1.55;
    display:flex; align-items:center; justify-content:center; padding: 32px 20px;
  }
  .login-shell { width:100%; max-width: 440px; }
  .brand-top { text-align:center; margin-bottom: 28px; }
  .brand-top .logo-svg { width: 90px; height: 90px; color: #ffffff; margin: 0 auto 16px; display: block; filter: drop-shadow(0 0 32px rgba(255,255,255,.35)) drop-shadow(0 0 12px rgba(77,201,255,.25)); }
  .brand-top .badge {
    display:inline-block; padding: 5px 12px;
    background: rgba(77,201,255,.12); color: var(--accent);
    border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;
  }
  .brand-top h1 { margin:0 0 6px; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: -.01em; }
  .brand-top h1 .hl { color: var(--accent); }
  .brand-top p { margin:0; color: var(--text-dim); font-size: 13px; }
  .card { background: var(--card); border:1px solid var(--border); border-radius: 14px; padding: 36px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.45); text-align:center; }
  .g-wrap { display:flex; justify-content:center; min-height: 44px; margin: 8px 0 12px; }
  .error { display:none; margin-top: 14px; padding: 10px 12px; background: rgba(248,113,113,.1); color: var(--danger); border: 1px solid rgba(248,113,113,.3); border-radius: 8px; font-size: 13px; }
  .error.show { display:block; }
  .info-restricted { margin-top: 18px; font-size: 11px; color: var(--text-dim); letter-spacing: .5px; }
  .info-restricted strong { color: var(--accent); }
  .footer-note { text-align:center; margin-top: 22px; color: var(--text-dim); font-size: 12px; }
</style>
</head>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
async function handleCredentialResponse(response) {
  const err = document.getElementById('error-msg');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/google', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ credential: response.credential }),
      credentials: 'same-origin'
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next') || '/';
      const dest = next.startsWith('/') && !next.startsWith('//') ? next : '/';
      window.location.replace(dest);
      return;
    }
    // Erros conhecidos
    if (res.status === 403) {
      err.textContent = '🚫 Seu email não está autorizado. Peça pra o admin liberar.';
    } else if (res.status === 401) {
      err.textContent = '⚠️ Token inválido. Tente entrar de novo.';
    } else if (res.status === 500) {
      err.textContent = '⚠️ Servidor não configurado. Avise o admin.';
    } else {
      err.textContent = '⚠️ Erro: ' + (data.error || 'desconhecido');
    }
    err.classList.add('show');
  } catch (e) {
    err.textContent = '⚠️ Erro de rede. Verifique sua conexão.';
    err.classList.add('show');
  }
}
</script>
