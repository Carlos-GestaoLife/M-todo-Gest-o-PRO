<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060a1f">
<meta name="color-scheme" content="dark">
<title>Entrar · Gestão Life PRO</title>
<style>
  :root {
    --bg:#0b1230; --bg-2:#121a42; --card:#1a2357;
    --accent:#4dc9ff; --accent-2:#7aa2ff;
    --text:#eef2ff; --text-dim:#a8b2d8;
    --danger:#f87171;
    --border:rgba(255,255,255,0.08);
    --body-bg-1: #060a1f; --body-bg-2: #0b1230;
    --input-bg: rgba(0,0,0,.25);
  }
  * { box-sizing: border-box; }
  html, body { background: var(--body-bg-1); }
  body {
    margin:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background: linear-gradient(180deg,var(--body-bg-1) 0%,var(--body-bg-2) 100%);
    color: var(--text); line-height: 1.55;
    display:flex; align-items:center; justify-content:center; padding: 32px 20px;
  }
  .login-shell { width:100%; max-width: 440px; }
  .brand-top { text-align:center; margin-bottom: 28px; }
  .brand-top .badge {
    display:inline-block; padding: 5px 12px;
    background: rgba(77,201,255,.12); color: var(--accent);
    border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;
  }
  .brand-top h1 { margin:0 0 6px; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: -.01em; }
  .brand-top h1 .hl { color: var(--accent); }
  .brand-top p { margin:0; color: var(--text-dim); font-size: 13px; }
  .card { background: var(--card); border:1px solid var(--border); border-radius: 14px; padding: 32px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
  .field input { width:100%; background: var(--bg-2); border:1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: inherit; }
  .field input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .btn { width:100%; padding: 13px 16px; border-radius: 10px; border:none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#001028; font-weight: 800; font-size: 14px; letter-spacing: .5px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: transform .15s, box-shadow .15s, opacity .15s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(77,201,255,.35); }
  .btn:disabled { opacity: .6; cursor: not-allowed; transform:none; box-shadow:none; }
  .error { display:none; margin-top: 14px; padding: 10px 12px; background: rgba(248,113,113,.1); color: var(--danger); border: 1px solid rgba(248,113,113,.3); border-radius: 8px; font-size: 13px; }
  .error.show { display:block; }
  .footer-note { text-align:center; margin-top: 22px; color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>
  <div class="login-shell">
    <div class="brand-top">
      <span class="badge">Gestão Life</span>
      <h1>Método <span class="hl">Gestão PRO</span></h1>
      <p>Acesso restrito · faça login para continuar</p>
    </div>
    <form class="card" id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" required autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit" id="submit-btn">Entrar</button>
      <div class="error" id="error-msg"></div>
    </form>
    <p class="footer-note">© Gestão Life · Metodologia Guiada de Execução</p>
  </div>
<script>
(function() {
  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/';
  function showError(msg) { errorBox.textContent = msg; errorBox.classList.add('show'); }
  function clearError() { errorBox.textContent = ''; errorBox.classList.remove('show'); }
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ username, password }),
        credentials: 'same-origin',
      });
      if (res.ok) {
        const dest = next.startsWith('/') && !next.startsWith('//') ? next : '/';
        window.location.replace(dest);
        return;
      }
      if (res.status === 401) showError('Usuário ou senha inválidos.');
      else if (res.status === 500) showError('Servidor não configurado. Avise o administrador.');
      else showError('Não foi possível entrar. Tente novamente.');
    } catch (err) {
      showError('Erro de rede. Verifique sua conexão.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
    }
  });
})();
</script>
</body>
</html>
